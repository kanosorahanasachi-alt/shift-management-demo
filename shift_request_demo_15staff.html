<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>スマホ希望入力デモ</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: #171a2a;
      --panel2: #20243a;
      --line: #303650;
      --text: #f4f4f7;
      --muted: #a5abc4;
      --red: #ef5b66;
      --blue: #5b8def;
      --green: #45d6a6;
      --yellow: #ffd166;
      --purple: #a78bfa;
      --shadow: 0 18px 40px rgba(0,0,0,.35);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
      background:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px),
        var(--bg);
      background-size: 40px 40px;
      color: var(--text);
      min-height: 100vh;
      padding: 18px 12px 40px;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(145deg, #1b2035, #141827);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 26px;
      letter-spacing: .03em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .card {
      background: rgba(23,26,42,.96);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .title {
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: .04em;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
    }

    input {
      width: 100%;
      background: #111525;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      font-size: 16px;
      outline: none;
    }

    .notice {
      background: rgba(255, 209, 102, .12);
      border-left: 5px solid var(--yellow);
      border-radius: 14px;
      padding: 12px 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    .mode-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .mode-btn {
      min-height: 58px;
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--muted);
      border-radius: 14px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex-direction: column;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .mode-btn.active {
      outline: 3px solid rgba(255,255,255,.75);
      outline-offset: 2px;
      color: white;
      transform: translateY(-1px);
    }

    .mode-early { border-color: rgba(91,141,239,.7); }
    .mode-late { border-color: rgba(167,139,250,.7); }
    .mode-off { border-color: rgba(239,91,102,.75); }
    .mode-paid { border-color: rgba(69,214,166,.75); }

    .dot {
      width: 17px;
      height: 17px;
      border-radius: 5px;
      display: inline-block;
    }

    .dot.early { background: var(--blue); }
    .dot.late { background: var(--purple); }
    .dot.off { background: var(--red); }
    .dot.paid { background: var(--green); }

    .current-mode {
      margin-bottom: 14px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--line);
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
    }

    .current-mode strong {
      color: white;
      font-size: 20px;
    }

    .month-nav {
      display: grid;
      grid-template-columns: 82px 1fr 82px;
      align-items: center;
      gap: 10px;
      margin: 18px 0 18px;
    }

    .month-nav button {
      height: 62px;
      border: 1px solid var(--line);
      background: var(--panel2);
      color: white;
      border-radius: 14px;
      font-size: 28px;
      font-weight: 900;
      cursor: pointer;
    }

    .month-label {
      text-align: center;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: .03em;
    }

    .week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    .week div {
      text-align: center;
      color: #6f7695;
      font-weight: 900;
      font-size: 16px;
    }

    .week .sun { color: #ff7f91; }
    .week .sat { color: #52d6b3; }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day {
      min-height: 80px;
      border-radius: 12px;
      background: var(--panel2);
      border: 1px solid var(--line);
      color: #e9ecf7;
      font-size: 23px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.025);
      font-weight: 500;
      overflow: hidden;
    }

    .day.empty {
      visibility: hidden;
      pointer-events: none;
    }

    .day.sun { color: #ff7f91; }
    .day.sat { color: #52d6b3; }

    .day.early {
      background: rgba(91,141,239,.82);
      color: white;
      border-color: rgba(91,141,239,1);
      font-weight: 900;
    }

    .day.late {
      background: rgba(167,139,250,.82);
      color: white;
      border-color: rgba(167,139,250,1);
      font-weight: 900;
    }

    .day.off {
      background: rgba(239,91,102,.9);
      color: white;
      border-color: rgba(255,120,130,1);
      font-weight: 900;
    }

    .day.paid {
      background: rgba(69,214,166,.84);
      color: #052e22;
      border-color: rgba(69,214,166,1);
      font-weight: 900;
    }

    .day .mini {
      position: absolute;
      bottom: 6px;
      left: 6px;
      right: 6px;
      font-size: 10px;
      font-weight: 900;
      text-align: center;
      opacity: .95;
      line-height: 1.1;
    }

    .summary {
      margin-top: 18px;
      background: rgba(32,36,58,.92);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 13px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.9;
    }

    .summary strong { color: white; }
    .summary .red { color: #ff7f91; }
    .summary .blue { color: #77a4ff; }
    .summary .purple { color: #c4b5fd; }
    .summary .green { color: #6ee7b7; }

    .actions {
      margin-top: 16px;
    }

    .action-btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px 10px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }

    .primary {
      background: #4f7df3;
      color: white;
    }

    .reset-link {
      display: block;
      width: fit-content;
      margin: 14px auto 0;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 13px;
      text-decoration: underline;
      cursor: pointer;
      padding: 6px 10px;
    }

    .confirm {
      display: none;
      margin-top: 14px;
      background: #111525;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .confirm h3 {
      color: white;
      margin: 0 0 8px;
      font-size: 17px;
    }

    .confirm .submit-note {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(79,125,243,.12);
      border: 1px solid rgba(79,125,243,.45);
      color: #dbe7ff;
    }

    @media (max-width: 560px) {
      body {
        padding: 12px 8px 34px;
      }

      .hero {
        padding: 17px;
      }

      .hero h1 {
        font-size: 22px;
      }

      .card {
        padding: 16px;
      }

      .input-row {
        grid-template-columns: 1fr;
      }

      .mode-buttons {
        grid-template-columns: repeat(2, 1fr);
      }

      .mode-btn {
        min-height: 54px;
        font-size: 15px;
      }

      .month-nav {
        grid-template-columns: 72px 1fr 72px;
      }

      .month-label {
        font-size: 24px;
      }

      .day {
        min-height: 79px;
        font-size: 25px;
      }

      .calendar,
      .week {
        gap: 8px;
      }
    }

    @media (max-width: 390px) {
      .day {
        min-height: 67px;
        font-size: 22px;
      }

      .calendar,
      .week {
        gap: 6px;
      }

      .month-label {
        font-size: 22px;
      }

      .month-nav button {
        height: 58px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>スマホ希望入力デモ</h1>
      <p>
        従業員がスマホから勤務希望を入力するためのデモ画面です。<br>
        未入力の日は「お任せ」として扱います。
      </p>
    </section>

    <section class="card">
      <h2 class="title">基本情報</h2>

      <div class="input-row">
        <div class="field">
          <label for="employeeCode">社員コード</label>
          <input id="employeeCode" type="text" inputmode="numeric" value="1001">
        </div>
        <div class="field">
          <label for="employeeName">氏名</label>
          <input id="employeeName" type="text" value="サンプル 太郎">
        </div>
      </div>

      <div class="notice">
        休みたい日は「休み」、有休希望日は「有休」を選択してください。<br>
        早番・遅番の希望がある日だけ入力してください。<br>
        何も選ばない日は「お任せ」扱いです。
      </div>
    </section>

    <section class="card">
      <h2 class="title">希望入力</h2>

      <div class="mode-buttons">
        <button class="mode-btn mode-early active" data-mode="early" type="button">
          <span class="dot early"></span>早番
        </button>
        <button class="mode-btn mode-late" data-mode="late" type="button">
          <span class="dot late"></span>遅番
        </button>
        <button class="mode-btn mode-off" data-mode="off" type="button">
          <span class="dot off"></span>休み
        </button>
        <button class="mode-btn mode-paid" data-mode="paid" type="button">
          <span class="dot paid"></span>有休
        </button>
      </div>

      <div class="current-mode" id="currentModeBox"></div>

      <div class="notice">
        上のボタンで入力内容を選び、日付をタップしてください。<br>
        同じ希望が入っている日をもう一度タップすると、未入力に戻ります。
      </div>

      <div class="month-nav">
        <button type="button" id="prevMonth">◀</button>
        <div class="month-label" id="monthLabel"></div>
        <button type="button" id="nextMonth">▶</button>
      </div>

      <div class="week">
        <div class="sun">日</div>
        <div>月</div>
        <div>火</div>
        <div>水</div>
        <div>木</div>
        <div>金</div>
        <div class="sat">土</div>
      </div>

      <div class="calendar" id="calendar"></div>

      <div class="summary" id="summary"></div>

      <div class="actions">
        <button type="button" class="action-btn primary" id="confirmBtn">提出イメージを確認する</button>
        <button type="button" class="reset-link" id="clearBtn">入力をリセット</button>
      </div>

      <div class="confirm" id="confirmBox"></div>
    </section>
  </div>

  <script>
    const labels = {
      early: "早番",
      late: "遅番",
      off: "休み",
      paid: "有休"
    };

    const submitLabels = {
      early: "早番希望",
      late: "遅番希望",
      off: "休み希望",
      paid: "有休希望"
    };

    let selectedMode = "early";

    let current = new Date();
    current.setDate(1);

    const requests = {};

    const calendarEl = document.getElementById("calendar");
    const monthLabelEl = document.getElementById("monthLabel");
    const summaryEl = document.getElementById("summary");
    const confirmBox = document.getElementById("confirmBox");
    const currentModeBox = document.getElementById("currentModeBox");

    function monthKey() {
      return current.getFullYear() + "-" + String(current.getMonth() + 1).padStart(2, "0");
    }

    function dateKey(day) {
      return current.getFullYear() + "-" + String(current.getMonth() + 1).padStart(2, "0") + "-" + String(day).padStart(2, "0");
    }

    function getMonthData() {
      const key = monthKey();
      if (!requests[key]) {
        requests[key] = {};
      }
      return requests[key];
    }

    function hideConfirm() {
      confirmBox.style.display = "none";
    }

    function setMode(mode) {
      selectedMode = mode;

      document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.mode === mode);
      });

      renderModeBox();
      hideConfirm();
    }

    function renderModeBox() {
      currentModeBox.innerHTML = `
        現在の入力：<strong>${labels[selectedMode]}</strong><br>
        日付をタップすると「${labels[selectedMode]}希望」として入力されます。<br>
        すでに同じ希望が入っている日をタップすると、未入力に戻ります。
      `;
    }

    function renderCalendar() {
      const year = current.getFullYear();
      const month = current.getMonth();
      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();
      const data = getMonthData();

      monthLabelEl.textContent = year + "年" + (month + 1) + "月";
      calendarEl.innerHTML = "";

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement("div");
        empty.className = "day empty";
        calendarEl.appendChild(empty);
      }

      for (let day = 1; day <= lastDate; day++) {
        const key = dateKey(day);
        const value = data[key];
        const dow = new Date(year, month, day).getDay();

        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = "day";
        cell.textContent = day;

        if (dow === 0) cell.classList.add("sun");
        if (dow === 6) cell.classList.add("sat");
        if (value) cell.classList.add(value);

        if (value) {
          const mini = document.createElement("div");
          mini.className = "mini";
          mini.textContent = labels[value];
          cell.appendChild(mini);
        }

        cell.addEventListener("click", () => {
          handleDayTap(key);
        });

        calendarEl.appendChild(cell);
      }

      renderSummary();
    }

    function handleDayTap(key) {
      const data = getMonthData();

      if (data[key] === selectedMode) {
        delete data[key];
      } else {
        data[key] = selectedMode;
      }

      renderCalendar();
      renderSummary();
      hideConfirm();
    }

    function renderSummary() {
      const data = getMonthData();
      const entries = Object.entries(data).sort();

      const counts = {
        early: 0,
        late: 0,
        off: 0,
        paid: 0
      };

      entries.forEach(([date, mode]) => {
        if (counts[mode] !== undefined) counts[mode]++;
      });

      const earlyDays = entries
        .filter(([date, mode]) => mode === "early")
        .map(([date]) => Number(date.slice(-2)));

      const lateDays = entries
        .filter(([date, mode]) => mode === "late")
        .map(([date]) => Number(date.slice(-2)));

      const offDays = entries
        .filter(([date, mode]) => mode === "off")
        .map(([date]) => Number(date.slice(-2)));

      const paidDays = entries
        .filter(([date, mode]) => mode === "paid")
        .map(([date]) => Number(date.slice(-2)));

      summaryEl.innerHTML = `
        <div><span class="blue">🔵</span> 早番希望: <strong>${formatDays(earlyDays)}</strong> (${counts.early}日)</div>
        <div><span class="purple">🟣</span> 遅番希望: <strong>${formatDays(lateDays)}</strong> (${counts.late}日)</div>
        <div><span class="red">🔴</span> 休み希望: <strong>${formatDays(offDays)}</strong> (${counts.off}日)</div>
        <div><span class="green">🟢</span> 有休希望: <strong>${formatDays(paidDays)}</strong> (${counts.paid}日)</div>
      `;
    }

    function formatDays(days) {
      if (!days.length) return "なし";
      return days.join("、") + "日";
    }

    function buildData() {
      const data = getMonthData();
      const requestData = {};

      Object.keys(data).sort().forEach(date => {
        const mode = data[date];
        requestData[date] = submitLabels[mode];
      });

      return {
        employeeCode: document.getElementById("employeeCode").value.trim(),
        employeeName: document.getElementById("employeeName").value.trim(),
        targetMonth: monthKey(),
        rule: "未入力日はお任せ扱い",
        requests: requestData,
        submittedAt: new Date().toLocaleString("ja-JP")
      };
    }

    function showConfirm() {
      const data = buildData();
      const entries = Object.entries(data.requests);

      let html = `
        <h3>提出イメージ</h3>
        <div><strong>社員コード：</strong>${escapeHtml(data.employeeCode || "未入力")}</div>
        <div><strong>氏名：</strong>${escapeHtml(data.employeeName || "未入力")}</div>
        <div><strong>対象月：</strong>${data.targetMonth}</div>
        <hr style="border:0;border-top:1px solid #303650;margin:10px 0;">
      `;

      if (entries.length === 0) {
        html += `<div>希望入力はありません。全日「お任せ」として扱います。</div>`;
      } else {
        entries.forEach(([date, value]) => {
          html += `<div>${date}：<strong>${value}</strong></div>`;
        });
      }

      html += `
        <div class="submit-note">
          これはデモ画面です。実運用では、この内容を管理者側で確認できる形にする想定です。
        </div>
      `;

      confirmBox.innerHTML = html;
      confirmBox.style.display = "block";
      confirmBox.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.querySelectorAll(".mode-btn").forEach(btn => {
      btn.addEventListener("click", () => setMode(btn.dataset.mode));
    });

    document.getElementById("prevMonth").addEventListener("click", () => {
      current.setMonth(current.getMonth() - 1);
      renderCalendar();
      hideConfirm();
    });

    document.getElementById("nextMonth").addEventListener("click", () => {
      current.setMonth(current.getMonth() + 1);
      renderCalendar();
      hideConfirm();
    });

    document.getElementById("confirmBtn").addEventListener("click", showConfirm);

    document.getElementById("clearBtn").addEventListener("click", () => {
      if (!confirm("この月の希望入力をすべて消します。よろしいですか？")) return;
      requests[monthKey()] = {};
      renderCalendar();
      hideConfirm();
    });

    document.getElementById("employeeCode").addEventListener("input", hideConfirm);
    document.getElementById("employeeName").addEventListener("input", hideConfirm);

    renderModeBox();
    renderCalendar();
  </script>
</body>
</html>
